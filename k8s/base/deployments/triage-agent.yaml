# =============================================================================
# Triage Agent — Drain3 Template Mining + ML Scoring
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-agent
  namespace: clif
  labels:
    app.kubernetes.io/name: triage-agent
    app.kubernetes.io/component: ai-agent
    app.kubernetes.io/part-of: clif-siem
    tier: compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: triage-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: triage-agent
        app.kubernetes.io/component: ai-agent
        tier: compute
    spec:
      nodeSelector:
        clif/tier: compute
      containers:
        - name: triage-agent
          image: ghcr.io/clif-siem/triage-agent:latest    # Built from agents/triage/
          ports:
            - name: health
              containerPort: 8300
          env:
            # ── Redpanda ──
            - name: KAFKA_BROKERS
              value: "redpanda-0.redpanda-headless.clif.svc.cluster.local:9092,redpanda-1.redpanda-headless.clif.svc.cluster.local:9092,redpanda-2.redpanda-headless.clif.svc.cluster.local:9092"
            - name: CONSUMER_GROUP_ID
              value: clif-triage-agent
            # ── Topics ──
            - name: INPUT_TOPICS
              value: "raw-logs,security-events,process-events,network-events"
            - name: TOPIC_TEMPLATED_LOGS
              value: templated-logs
            - name: TOPIC_TRIAGE_SCORES
              value: triage-scores
            - name: TOPIC_ANOMALY_ALERTS
              value: anomaly-alerts
            - name: TOPIC_DEAD_LETTER
              value: dead-letter
            # ── ClickHouse ──
            - name: CLICKHOUSE_HOST
              value: clickhouse-headless.clif.svc.cluster.local
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_DB
            # ── Drain3 ──
            - name: DRAIN3_DEPTH
              value: "4"
            - name: DRAIN3_SIM_TH
              value: "0.4"
            - name: DRAIN3_MAX_CHILDREN
              value: "100"
            # ── ML Models ──
            - name: MODEL_LGBM_PATH
              value: /models/lgbm_triage.txt
            - name: MODEL_EIF_PATH
              value: /models/eif_triage.pkl
            - name: MODEL_ARF_CHECKPOINT
              value: /models/arf_checkpoint.pkl
            # ── Scoring ──
            - name: SCORE_WEIGHTS
              value: "lgbm=0.45,eif=0.35,arf=0.20"
            - name: DEFAULT_SUSPICIOUS_THRESHOLD
              value: "0.70"
            - name: DEFAULT_ANOMALOUS_THRESHOLD
              value: "0.90"
            - name: FEATURE_STALENESS_TIMEOUT_SEC
              value: "300"
            # ── Performance ──
            - name: BATCH_SIZE
              value: "1000"
            - name: INFERENCE_WORKERS
              value: "4"
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 45
            periodSeconds: 30
